<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="3" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background Tile -->
  <rect x="5" y="5" width="90" height="90" rx="18" fill="#EDC22E" filter="url(#shadow)"/>
  <!-- Inner border or highlight -->
  <rect x="8" y="8" width="84" height="84" rx="15" fill="none" stroke="#FFF" stroke-width="1.5" opacity="0.25"/>
  <!-- "2048" text -->
  <text x="50" y="59" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="25" 
        font-weight="bold" 
        fill="#FFFFFF" 
        text-anchor="middle"
        letter-spacing="-1">2048</text>
  <!-- Grid pattern decoration in corners -->
  <rect x="15" y="15" width="6" height="6" rx="1" fill="#FFF" opacity="0.3"/>
  <rect x="79" y="15" width="6" height="6" rx="1" fill="#FFF" opacity="0.3"/>
  <rect x="15" y="79" width="6" height="6" rx="1" fill="#FFF" opacity="0.3"/>
  <rect x="79" y="79" width="6" height="6" rx="1" fill="#FFF" opacity="0.3"/>
</svg>
