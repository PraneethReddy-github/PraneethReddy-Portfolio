<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="doomGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF5F00"/>
      <stop offset="50%" stop-color="#FF2E00"/>
      <stop offset="100%" stop-color="#8B0000"/>
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="2" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>
  <!-- Background Shield/Badge -->
  <rect x="5" y="5" width="90" height="90" rx="20" fill="#151515" stroke="#FF2E00" stroke-width="3" filter="url(#dropShadow)" />
  <!-- Skull/Doom Face Minimalist Graphic -->
  <path d="M50 22 C38 22 34 32 34 42 C34 47 36 52 39 55 L39 63 C39 65 41 67 43 67 L45 67 L45 74 C45 76 47 78 49 78 L51 78 C53 78 55 76 55 74 L55 67 L57 67 C59 67 61 65 61 63 L61 55 C64 52 66 47 66 42 C66 32 62 22 50 22 Z" fill="url(#doomGrad)"/>
  <!-- Eyes -->
  <circle cx="44" cy="40" r="3.5" fill="#FFFFFF"/>
  <circle cx="56" cy="40" r="3.5" fill="#FFFFFF"/>
  <polygon points="41,35 47,38 45,39 41,37" fill="#151515"/>
  <polygon points="59,35 53,38 55,39 59,37" fill="#151515"/>
  <!-- Nose cavity -->
  <polygon points="50,47 48,51 52,51" fill="#151515"/>
  <!-- Teeth/Grill lines -->
  <line x1="47" y1="61" x2="47" y2="65" stroke="#151515" stroke-width="2"/>
  <line x1="50" y1="61" x2="50" y2="65" stroke="#151515" stroke-width="2"/>
  <line x1="53" y1="61" x2="53" y2="65" stroke="#151515" stroke-width="2"/>
  <!-- Crosshair or accents -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#FF5F00" stroke-width="1.5" stroke-dasharray="4 8" opacity="0.4"/>
</svg>
